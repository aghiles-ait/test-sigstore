name: Build and Push Release Image

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  prepare:
    name: Determine image tag
    runs-on: ubuntu-latest
    # Prevent execution on forks
    if: github.repository_owner == 'aghiles-ait'
    outputs:
      image_tag: ${{ steps.determine-tag.outputs.image_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine base tag
        id: determine-tag
        run: |
          # Since this workflow only triggers on tags matching 'v*.*.*' we know we're always dealing with a version tag
          TAG_ON_MAIN=$(git branch -r --contains ${{ github.sha }} 'origin/main')

          if [ -z "$TAG_ON_MAIN" ] ; then
            echo "Error: Tag ${{ github.ref_name }} is not on main branch"
            echo "Tags must be created on main branch to generate X.Y.Z image tags"
            exit 1
          fi

          GITHUB_REF_NAME="${{ github.ref_name }}"
          echo "Processing tag on main branch: ${{ github.ref_name }}"
          echo "image_tag=${GITHUB_REF_NAME#v}" | tee -a $GITHUB_OUTPUT
  
  docker-login-build-push:
    name: Build image
    needs: prepare
    runs-on: ubuntu-latest

    outputs:
      digest: ${{ steps.build.outputs.digest }}

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: docker.io/${{ vars.DOCKERHUB_USERNAME }}/test-sigstore:${{ needs.prepare.outputs.image_tag }}

  sign:
    name: Attest SLSA provenance (keyless)
    needs: [prepare, docker-login-build-push]
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write       # OIDC keyless
      attestations: write    # écrire l'attestation côté GitHub

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate & sign SLSA provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: docker.io/${{ vars.DOCKERHUB_USERNAME }}/test-sigstore
          subject-digest: ${{ needs.docker-login-build-push.outputs.digest }}
          push-to-registry: true   # pousse l'attestation dans Docker Hub (referrer)